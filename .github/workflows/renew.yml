name: Zenix 自动续期

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      enable_recording:
        description: '是否录屏 (true=录屏 / false=不录屏)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg curl unzip \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"

      - name: 运行脚本
        env:
          ZENIX_EMAIL:      ${{ secrets.ZENIX_EMAIL }}
          ZENIX_PASSWORD:   ${{ secrets.ZENIX_PASSWORD }}
          WXPUSHER_TOKEN:   ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID:     ${{ secrets.WXPUSHER_UID }}
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          ENABLE_RECORDING: ${{ github.event.inputs.enable_recording || 'false' }}
        run: |
          # 启动 Xvfb 虚拟显示器
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          XVFB_PID=$!
          # 循环等待最多 15 秒，直到 Xvfb 真正就绪
          for i in $(seq 1 15); do
            sleep 1
            if DISPLAY=:99 xdpyinfo > /dev/null 2>&1; then
              echo "Xvfb 就绪（等待 ${i}s）"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "Xvfb 超时，继续尝试..."
            fi
          done

          # 根据开关决定是否录屏
          RECORD_PID=""
          if [ "$ENABLE_RECORDING" = "true" ]; then
            echo "🎬 录屏已开启"
            ffmpeg -f x11grab -video_size 1280x720 -framerate 15 -i :99 \
              -codec:v libx264 -preset ultrafast -crf 28 \
              -pix_fmt yuv420p -movflags +faststart /tmp/recording.mp4 \
              > /tmp/ffmpeg.log 2>&1 &
            RECORD_PID=$!
            sleep 3
          else
            echo "⏭️ 录屏已跳过（定时任务默认不录屏）"
          fi

          # 运行续期脚本
          timeout 270 python scripts/renew.py || echo "脚本退出码: $?"

          echo "=== 截图目录内容 ==="
          ls -la ./screenshots/ || echo "截图目录不存在"

          # 停止录屏（如果有）
          if [ -n "$RECORD_PID" ]; then
            sleep 2
            kill $RECORD_PID 2>/dev/null || true
            wait $RECORD_PID 2>/dev/null || true
            VIDEO_SIZE=$(stat -c%s /tmp/recording.mp4 2>/dev/null || echo 0)
            echo "录像文件大小: ${VIDEO_SIZE} bytes"
          fi

          kill $XVFB_PID 2>/dev/null || true

      - name: 上传截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            ./screenshots/*.png
            /tmp/recording.mp4
            /tmp/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3

      - name: 清理旧的 workflow runs（只保留最近 2 个）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow }}"

          echo "获取所有 runs..."
          RUN_IDS=$(gh run list \
            --repo "$REPO" \
            --workflow "$WORKFLOW_ID" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')

          # 跳过前2个，删除其余的
          SKIP=2
          COUNT=0
          for RUN_ID in $RUN_IDS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le $SKIP ]; then
              echo "保留 run #$RUN_ID"
            else
              echo "删除 run #$RUN_ID"
              gh run delete "$RUN_ID" --repo "$REPO" || true
            fi
          done
          echo "清理完成，共保留 ${SKIP} 个 run"
